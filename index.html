<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Paint</title>
    <link rel="icon" href="/pixel-paint/favicon.ico">
    <script type="module" crossorigin src="/pixel-paint/assets/index-N48JAq3h.js"></script>
    <link rel="stylesheet" crossorigin href="/pixel-paint/assets/index-Bd_jmQpD.css">
  </head>
  <body>
    <header class="header">
      <h1 class="header__title">Pixel Paint</h1>
    </header>

    <main class="main">
      <div class="controls">
        <div class="controls__group">
          <div class="controls__group--color">
            <input type="color" id="canvas-color" class="controls__input--color" value="#ffffff">
            <label for="canvas-color">Canvas Color</label>
          </div>

          <div class="controls__group--color">
            <input type="color" id="paint-color" class="controls__input--color" value="#333333">
            <label for="paint-color">Paint Color</label>
          </div>
        </div>

        <div class="controls__group controls__group--grid-size">
          <label for="grid-size">Grid Size: 16 x 16</label>
          <input type="range" id="grid-size" class="controls__input--grid-size" min="0" max="4" step="1" value="1">
        </div>

        <div class="controls__group">
          <button class="controls__btn controls__btn--custom-color controls__btn--selected">Custom Color</button>
          <button class="controls__btn controls__btn--random-color">Random Color</button>
        </div>

        <div class="controls__group">
          <button class="controls__btn controls__btn--eraser">Eraser</button>
          <button class="controls__btn controls__btn--clear">Clear</button>
        </div>

        <div class="controls__group">
          <button class="controls__btn controls__btn--save">Save</button>
          <button class="controls__btn controls__btn--gridlines controls__btn--selected">Gridlines</button>
        </div>
      </div>

      <canvas class="canvas"></canvas>
    </main>
  </body>
</html>
